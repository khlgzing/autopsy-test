  function renderQuestion(index){
    if(index>=questions.length){ finishQuiz(); return; }
    var q=questions[index];
    document.getElementById('questionNumber').textContent='Q'+q.id+' / 18';
    document.getElementById('questionText').textContent=q.text;
    var stageHint = q.stage===1 ? '💬 你还在立“我很正常”人设的时候' : (q.stage===2 ? '💬 关系的 CPU 已经开始冒烟了' : '💬 好了，你的精神状态已经遥遥领先了');

    var list=document.getElementById('optionsList'); list.innerHTML='';
    q.options.forEach(function(opt){
      var btn=document.createElement('button'); btn.className='option-btn';
      btn.innerHTML='<span class="option-letter">'+opt.key+'</span><span>'+opt.text+'</span>';
      btn.addEventListener('click',function(){ selectOption(index,opt.key,btn); });
      list.appendChild(btn);
    });
    var progress=Math.round((index/18)*100);
    document.getElementById('progressBar').style.width=progress+'%';
    document.getElementById('progressLabel').textContent='精神状态损耗值 '+progress+'%';

    var labels=['脑补力','回避力','讨好力','追问力','控制力','焦虑力','计较力','摆烂力'];
    var maxVal=Math.max.apply(null,dimKeys.map(function(d){return scores[d]||0;}),1);
    var cx=150,cy=150,r=105;
    ctx.clearRect(0,0,300,300);
    for(var i=1;i<=5;i++){ ctx.beginPath(); ctx.arc(cx,cy,r*i/5,0,Math.PI*2); ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.stroke(); }
    dimKeys.forEach(function(_,i){
      var angle=(Math.PI*2/dimKeys.length)*i-Math.PI/2;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r*Math.cos(angle),cy+r*Math.sin(angle));
      ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.stroke();
    });
    ctx.beginPath();
    dimKeys.forEach(function(d,i){
      var angle=(Math.PI*2/dimKeys.length)*i-Math.PI/2;
      var val=((scores[d]||0)/maxVal)*r;
      var x=cx+val*Math.cos(angle), y=cy+val*Math.sin(angle);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.closePath(); ctx.fillStyle='rgba(255,107,157,0.22)'; ctx.fill();
    ctx.strokeStyle='#FF6B9D'; ctx.lineWidth=2.5; ctx.shadowColor='rgba(255,107,157,0.5)'; ctx.shadowBlur=12; ctx.stroke();
    ctx.shadowColor='transparent'; ctx.shadowBlur=0;
    dimKeys.forEach(function(d,i){
      var angle=(Math.PI*2/dimKeys.length)*i-Math.PI/2;
      var val=((scores[d]||0)/maxVal)*r;
      var x=cx+val*Math.cos(angle), y=cy+val*Math.sin(angle);
      ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
      ctx.strokeStyle='#FF6B9D'; ctx.lineWidth=2; ctx.stroke();
    });
    ctx.fillStyle='#f0e6ff'; ctx.font='bold 10px -apple-system, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    dimKeys.forEach(function(_,i){
      var angle=(Math.PI*2/dimKeys.length)*i-Math.PI/2;
      var lx=cx+(r+26)*Math.cos(angle), ly=cy+(r+26)*Math.sin(angle);
      ctx.fillText(labels[i],lx,ly);
    });
  }
